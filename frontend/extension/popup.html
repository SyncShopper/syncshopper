<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>SyncShopper Login</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222222;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: #4b5563;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }

    input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #16a34a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #15803d;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .secondary-button {
      background: #ffffff;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .secondary-button:hover {
      background: #f0fdf4;
    }

    .danger-button {
      background: #ffffff;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .danger-button:hover {
      background: #fef2f2;
    }

    .hidden {
      display: none;
    }

    .status-box {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #f0fdf4;
      color: #166534;
      font-size: 13px;
      line-height: 1.45;
    }

    #statusMessage {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <section id="loginSection">
    <h1>SyncShopper 로그인</h1>
    <p>유튜브 상품 캡쳐 분석을 사용하려면 먼저 로그인해주세요.</p>

    <label for="loginId">아이디</label>
    <input id="loginId" type="text" autocomplete="username" placeholder="이메일을 입력하세요" />

    <label for="password">비밀번호</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요" />

    <button id="loginButton" type="button">로그인</button>
    <button id="signupButton" class="secondary-button" type="button">회원가입</button>
  </section>

  <section id="loggedInSection" class="hidden">
    <h1>로그인됨</h1>
    <div class="status-box">
      이제 유튜브 영상에서 상품 캡쳐를 사용할 수 있습니다.
    </div>
    <button id="logoutButton" class="danger-button" type="button">로그아웃</button>
  </section>

  <div id="statusMessage"></div>

  <script src="popup.js"></script>
</body>
</html>
