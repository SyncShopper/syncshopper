<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>CapShop Login</title>
  <style>
    :root {
      --capshop-bg: #F3F0EC;
      --capshop-bg-soft: #fffaf2;
      --capshop-ink: #1b2033;
      --capshop-line: #2d3347;
      --capshop-navy: #222a44;
      --capshop-green: #277a54;
      --capshop-green-soft: #dff5df;
      --capshop-mint: #81d8a0;
      --capshop-coral: #ef8f8f;
      --capshop-yellow: #f4c96b;
      --capshop-shadow: rgba(27, 32, 51, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      border-radius: 16px;
      background: transparent;
      overflow: hidden;
    }

    body {
      width: 328px;
      margin: 0;
      padding: 0;
      border: 3px solid var(--capshop-line);
      border-radius: 16px;
      background:
        linear-gradient(90deg, rgba(34, 42, 68, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(34, 42, 68, 0.06) 1px, transparent 1px),
        var(--capshop-bg);
      background-size: 18px 18px;
      color: var(--capshop-ink);
      font-family: "Galmuri11", "NeoDunggeunmo", "DungGeunMo", "Jua", "Gaegu", "Single Day", "Segoe UI Rounded", "Apple SD Gothic Neo", sans-serif;
      letter-spacing: 0;
      box-shadow: 0 0 0 3px var(--capshop-bg-soft) inset;
      overflow: hidden;
    }

    section {
      padding: 18px;
    }

    h1 {
      margin: -18px -18px 16px;
      padding: 14px 18px;
      border-bottom: 3px solid var(--capshop-line);
      border-radius: 13px 13px 0 0;
      background: var(--capshop-navy);
      color: var(--capshop-bg-soft);
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
      text-shadow: 2px 2px 0 #12182a;
    }

    p {
      margin: 0 0 4px;
      color: #3c4358;
      font-size: 13px;
      line-height: 1.45;
      word-break: keep-all;
    }

    label {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 14px 0 7px;
      color: #000000;
      font-size: 13px;
      font-weight: 900;
    }

    label::before {
      content: "";
      width: 11px;
      height: 11px;
      border: 3px solid var(--capshop-line);
      border-radius: 4px;
      background: var(--capshop-coral);
      box-shadow: 2px 2px 0 rgba(27, 32, 51, 0.14);
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 9px 11px;
      border: 3px solid var(--capshop-line);
      border-radius: 12px;
      background: var(--capshop-bg-soft);
      color: #111827;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      outline: none;
      box-shadow: 4px 4px 0 rgba(27, 32, 51, 0.12);
    }

    input::placeholder {
      color: #4b5563;
      opacity: 1;
    }

    input:focus {
      border-color: var(--capshop-green);
      box-shadow: 0 0 0 4px rgba(129, 216, 160, 0.28), 4px 4px 0 rgba(27, 32, 51, 0.12);
    }

    button {
      width: 100%;
      min-height: 44px;
      margin-top: 14px;
      padding: 9px 12px;
      border: 3px solid var(--capshop-line);
      border-radius: 12px;
      background: var(--capshop-mint);
      color: var(--capshop-ink);
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.1;
      box-shadow: 4px 4px 0 var(--capshop-shadow);
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    button:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--capshop-shadow);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.68;
    }

    .secondary-button {
      background: #fff2ce;
    }

    .social-login-buttons {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .social-login-button {
      margin-top: 0;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 500;
      background: #ffffff;
      transition: opacity 120ms ease;
    }

    .social-login-button.kakao {
      background: #fee500;
      border-color: #fee500;
      color: #000000;
    }

    .social-login-button.google {
      background: #ffffff;
      color: #1f2937;
    }

    .social-login-icon {
      display: block;
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    i.social-login-icon {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-style: normal;
      line-height: 1;
    }

    i.social-login-icon::before {
      content: "";
      display: block;
      width: 18px;
      height: 14px;
      border-radius: 50%;
      background: currentColor;
    }

    i.social-login-icon::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      margin-top: 12px;
      margin-left: -7px;
      background: currentColor;
      transform: rotate(35deg);
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }

    .danger-button {
      background: #ffe0e0;
    }

    .hidden {
      display: none;
    }

    .status-box {
      padding: 12px;
      border: 3px solid var(--capshop-line);
      border-radius: 12px;
      background: var(--capshop-green-soft);
      color: var(--capshop-ink);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
      word-break: keep-all;
      box-shadow: 4px 4px 0 rgba(27, 32, 51, 0.12);
    }

    #statusMessage {
      min-height: 18px;
      padding: 0 18px 16px;
      color: var(--capshop-green);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.35;
      word-break: keep-all;
    }

    #statusMessage.status-error {
      margin: 8px 18px 16px;
      padding: 8px 10px;
      border: 1px solid #ef8f8f;
      border-radius: 6px;
      background: #fff1f1;
      color: #b42318;
    }

    #statusMessage.status-success {
      color: #166534;
    }

    #statusMessage.status-info {
      color: #1b2033;
    }

    body,
    label::before,
    input,
    button,
    .status-box {
      border-width: 2px;
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom-width: 2px;
    }

    h1::before {
      content: "";
      width: 36px;
      height: 36px;
      flex: 0 0 auto;
      background: url("icons/capshop_logo_white.png") center / contain no-repeat;
      filter: drop-shadow(1px 2px 0 rgba(18, 24, 42, 0.28));
    }

    /* Flat theme: remove decorative shading and use thin gray borders. */
    :root {
      --capshop-line: #8b92a3;
      --capshop-mint: #81d8a0;
      --capshop-shadow: transparent;
    }

    body {
      border: 1px solid var(--capshop-line);
      background:
        linear-gradient(90deg, rgba(70, 80, 106, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(70, 80, 106, 0.08) 1px, transparent 1px),
        var(--capshop-bg);
      background-size: 18px 18px;
      box-shadow: none;
    }

    h1 {
      border-bottom: 1px solid var(--capshop-line);
      box-shadow: none;
      text-shadow: none;
    }

    label::before,
    input,
    button,
    .status-box {
      border: 1px solid var(--capshop-line);
      box-shadow: none;
      text-shadow: none;
    }

    input:focus {
      border-color: #6f7788;
      box-shadow: none;
    }

    button:hover {
      transform: none;
      box-shadow: none;
    }

    .social-login-button:hover {
      opacity: 0.8;
    }

    h1::before {
      filter: none;
    }

    h1,
    label {
      gap: 8px;
    }

    input {
      padding: 10px 12px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      color: var(--capshop-ink);
    }
  </style>
</head>
