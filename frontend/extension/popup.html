<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>SyncShopper Capture</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222222;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 17px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 9px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
      font-family: Arial, sans-serif;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #16a34a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #15803d;
    }

    #statusMessage {
      margin-top: 10px;
      font-size: 12px;
      color: #16a34a;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>SyncShopper Capture &#49444;&#51221;</h1>

  <label for="backendBaseUrl">&#48177;&#50644;&#46300; &#51452;&#49548;</label>
  <input
    id="backendBaseUrl"
    type="text"
    placeholder="http://localhost:8080"
  />

  <label for="accessToken">Access Token</label>
  <textarea
    id="accessToken"
    placeholder="JWT accessToken&#51012; &#51077;&#47141;&#54616;&#49464;&#50836;"
  ></textarea>

  <button id="saveButton" type="button">&#51200;&#51109;</button>

  <div id="statusMessage"></div>

  <script src="popup.js"></script>
</body>
</html>
