spring:
  profiles:
    active: local

server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.syncshopper.domain
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.syncshopper: debug
    org.mybatis: debug

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
