spring:
  profiles:
    active: local

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.syncshopper.domain
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.syncshopper: debug
    org.mybatis: debug

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:syncshopper-local-dev-secret-key-syncshopper-local-dev-secret-key}
    access-token-expiration: 3600000
  oauth2:
    authorized-redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
  ai:
    mock-enabled: false
    fastapi-base-url: http://localhost:8000
    analyze-path: /api/ai/analyze-frame
    commerce-query-path: /api/ai/generate-commerce-query
    timeout-ms: ${AI_FASTAPI_TIMEOUT_MS:180000}
  naver:
    client-id: ${NAVER_CLIENT_ID:${NAVER_SHOPPING_CLIENT_ID:}}
    client-secret: ${NAVER_CLIENT_SECRET:${NAVER_SHOPPING_CLIENT_SECRET:}}
    search:
      shopping-url: https://openapi.naver.com/v1/search/shop.json
      image-url: https://openapi.naver.com/v1/search/image
      blog-url: https://openapi.naver.com/v1/search/blog.json
      cafe-url: https://openapi.naver.com/v1/search/cafearticle.json
      web-url: https://openapi.naver.com/v1/search/webkr.json
      display: 5
      start: 1
      sort: sim
      exclude: used:rental:cbshop
      cache-ttl-hours: 24
    shopping:
      client-id: ${NAVER_SHOPPING_CLIENT_ID:${NAVER_CLIENT_ID:}}
      client-secret: ${NAVER_SHOPPING_CLIENT_SECRET:${NAVER_CLIENT_SECRET:}}
      base-url: https://openapi.naver.com
      search-path: /v1/search/shop.json
      display: 5
      start: 1
      sort: sim
      exclude: used:rental:cbshop
